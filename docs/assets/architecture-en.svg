<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 1030">
  <title>Juso / 双面搜 — Two-Sided Browser Extension Architecture</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- ══ Layer 1 · Background ══ -->
  <rect width="1040" height="1030" fill="#0f172a"/>
  <rect width="1040" height="1030" fill="url(#grid)"/>

  <!-- ══ Layer 2 · Boundaries ══ -->
  <!-- Human side zone -->
  <rect x="40" y="110" width="300" height="342" rx="10" fill="none" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Agent side zone -->
  <rect x="700" y="110" width="300" height="342" rx="10" fill="none" stroke="#34d399" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Security enclave around Worker + storage -->
  <rect x="360" y="495" width="320" height="300" rx="8" fill="rgba(136,19,55,0.08)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Hub halo behind Background Worker -->
  <rect x="374" y="514" width="292" height="86" rx="9" fill="none" stroke="#a78bfa" stroke-opacity="0.22" stroke-width="1.5"/>

  <!-- ══ Layer 3 · Arrows ══ -->
  <!-- Human side → Background Worker (messaging) -->
  <path d="M 190,432 L 190,557 L 378,557" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- Agent Bridge → Background Worker (one-shot bounded call) -->
  <path d="M 850,377 L 850,470 L 600,470 L 600,518" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <!-- Background Worker → Provider adapters -->
  <path d="M 660,557 L 718,557" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Provider adapters → AI Search APIs -->
  <path d="M 850,594 L 850,868" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Background Worker → Search Engines (browser navigation) -->
  <path d="M 380,575 L 150,575 L 150,868" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Worker ↔ storage (reads keys, writes prefs/cache) -->
  <path d="M 520,594 L 520,684" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <path d="M 520,606 L 520,596" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <!-- SERP Switch Bar ↔ Search Engines (in-page, left rail) -->
  <path d="M 60,287 L 32,287 L 32,905 L 38,905" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.75" marker-end="url(#arrow-cyan)"/>
  <path d="M 44,287 L 58,287" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.75" marker-end="url(#arrow-cyan)"/>

  <!-- ══ Layer 4 · Mask rects (opaque, hide arrows under components) ══ -->
  <rect x="60" y="142" width="260" height="70" rx="6" fill="#0f172a"/>
  <rect x="60" y="252" width="260" height="70" rx="6" fill="#0f172a"/>
  <rect x="60" y="362" width="260" height="70" rx="6" fill="#0f172a"/>
  <rect x="720" y="197" width="260" height="70" rx="6" fill="#0f172a"/>
  <rect x="720" y="307" width="260" height="70" rx="6" fill="#0f172a"/>
  <rect x="380" y="520" width="280" height="74" rx="6" fill="#0f172a"/>
  <rect x="720" y="520" width="260" height="74" rx="6" fill="#0f172a"/>
  <!-- cylinder mask -->
  <rect x="380" y="692" width="240" height="60" fill="#0f172a"/>
  <ellipse cx="500" cy="692" rx="120" ry="12" fill="#0f172a"/>
  <ellipse cx="500" cy="752" rx="120" ry="12" fill="#0f172a"/>
  <rect x="40" y="870" width="300" height="70" rx="6" fill="#0f172a"/>
  <rect x="720" y="870" width="260" height="70" rx="6" fill="#0f172a"/>

  <!-- ══ Layer 5 · Component boxes ══ -->
  <!-- Human side (cyan) -->
  <rect x="60" y="142" width="260" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="60" y="252" width="260" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="60" y="362" width="260" height="70" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Agent side (emerald) -->
  <rect x="720" y="197" width="260" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <rect x="720" y="307" width="260" height="70" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <!-- Shared core (violet) -->
  <rect x="380" y="520" width="280" height="74" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="2"/>
  <rect x="720" y="520" width="260" height="74" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- storage cylinder -->
  <rect x="380" y="692" width="240" height="60" fill="rgba(76,29,149,0.4)"/>
  <ellipse cx="500" cy="752" rx="120" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="380" y1="692" x2="380" y2="752" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="620" y1="692" x2="620" y2="752" stroke="#a78bfa" stroke-width="1.5"/>
  <ellipse cx="500" cy="692" rx="120" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <!-- External services (slate) -->
  <rect x="40" y="870" width="300" height="70" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="720" y="870" width="260" height="70" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ══ Layer 6 · Text ══ -->
  <!-- zone headers -->
  <text x="54" y="130" fill="#22d3ee" font-size="9" font-weight="600" letter-spacing="1">Human Side</text>
  <text x="714" y="130" fill="#34d399" font-size="9" font-weight="600" letter-spacing="1">Agent Side</text>
  <text x="980" y="508" fill="#a78bfa" font-size="10" font-weight="700" letter-spacing="1" text-anchor="end">Shared Core</text>
  <text x="372" y="510" fill="#fb7185" font-size="8" font-weight="500">Keys read by Worker only — invisible to UI &amp; agents</text>

  <!-- human side boxes -->
  <text x="190" y="168" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Search Page</text>
  <text x="190" y="188" fill="#94a3b8" font-size="9" text-anchor="middle">Source select · AI search · cache &amp; history</text>
  <text x="190" y="278" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">SERP Switch Bar</text>
  <text x="190" y="297" fill="#94a3b8" font-size="9" text-anchor="middle">Google / Bing / Baidu / Douyin / Xiaohongshu</text>
  <text x="190" y="311" fill="#94a3b8" font-size="9" text-anchor="middle">in-page switching</text>
  <text x="190" y="388" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Options</text>
  <text x="190" y="408" fill="#94a3b8" font-size="9" text-anchor="middle">BYOK key management</text>

  <!-- agent side boxes -->
  <text x="850" y="223" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Agent Skill · Python CLI</text>
  <text x="850" y="243" fill="#94a3b8" font-size="9" text-anchor="middle">list-providers · search · engine-search</text>
  <text x="850" y="333" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Agent Bridge</text>
  <text x="850" y="353" fill="#94a3b8" font-size="9" text-anchor="middle">short-lived · loopback · one-shot token</text>

  <!-- shared core -->
  <text x="520" y="548" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">Background Worker</text>
  <text x="520" y="570" fill="#94a3b8" font-size="9" text-anchor="middle">Service Worker · message gateway · provider exec</text>
  <text x="850" y="548" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Provider Adapters</text>
  <text x="850" y="570" fill="#94a3b8" font-size="9" text-anchor="middle">Tavily · Exa · Stepfun REST · Stepfun MCP</text>
  <text x="500" y="718" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">chrome.storage.local</text>
  <text x="500" y="734" fill="#94a3b8" font-size="9" text-anchor="middle">BYOK keys · prefs · cache</text>

  <!-- external services -->
  <text x="190" y="896" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">Search Engines</text>
  <text x="190" y="916" fill="#94a3b8" font-size="9" text-anchor="middle">Google · Bing · Baidu · Douyin · Xiaohongshu</text>
  <text x="850" y="896" fill="#ffffff" font-size="11" font-weight="600" text-anchor="middle">AI Search APIs</text>
  <text x="850" y="916" fill="#94a3b8" font-size="9" text-anchor="middle">Tavily · Exa · Stepfun</text>

  <!-- arrow labels -->
  <text x="283" y="549" fill="#67e8f9" font-size="8" text-anchor="middle">messaging</text>
  <text x="725" y="462" fill="#6ee7b7" font-size="8" text-anchor="middle">one-shot bounded call</text>
  <text x="862" y="735" fill="#94a3b8" font-size="8">REST / MCP</text>
  <text x="162" y="645" fill="#94a3b8" font-size="8">browser navigation</text>
  <text x="534" y="645" fill="#c4b5fd" font-size="8">reads keys / writes prefs</text>

  <!-- ══ Layer 7 · Legend ══ -->
  <rect x="302" y="984" width="16" height="12" rx="3" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="326" y="994" fill="#94a3b8" font-size="9">Human Side</text>
  <rect x="389" y="984" width="16" height="12" rx="3" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="413" y="994" fill="#94a3b8" font-size="9">Agent Side</text>
  <rect x="485" y="984" width="16" height="12" rx="3" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="509" y="994" fill="#94a3b8" font-size="9">Shared Core</text>
  <rect x="581" y="984" width="16" height="12" rx="3" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="605" y="994" fill="#94a3b8" font-size="9">External</text>
  <rect x="677" y="984" width="16" height="12" rx="3" fill="rgba(136,19,55,0.25)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="701" y="994" fill="#94a3b8" font-size="9">Security Boundary</text>

  <!-- ══ Layer 8 · Title ══ -->
  <text x="1000" y="54" fill="#64748b" font-size="8" letter-spacing="2" text-anchor="end">ARCHITECTURE · CHROME MV3</text>
  <text x="40" y="62" font-size="18" font-weight="700"><tspan fill="#e2e8f0">双面搜</tspan><tspan fill="#64748b"> / </tspan><tspan fill="#22d3ee">Juso</tspan></text>
  <text x="40" y="84" fill="#94a3b8" font-size="9">Two-Sided Browser Extension Architecture</text>
</svg>
