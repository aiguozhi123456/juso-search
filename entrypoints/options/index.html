<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="manifest.open_in_tab" content="true" />
    <script>
      // FOUC 防护：首屏前同步按系统偏好设 data-theme，再异步用存储纠正显式偏好。
      // 在扩展页里 chrome.storage.local 可用；非扩展环境安全降级。
      (function () {
        try {
          var d = document.documentElement;
          var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          d.dataset.theme = sysDark ? 'dark' : 'light';
          if (typeof chrome !== 'undefined' && chrome.storage && chrome.storage.local) {
            chrome.storage.local.get('themePref', function (r) {
              var p = r && r.themePref;
              if (p === 'light' || p === 'dark') d.dataset.theme = p;
            });
          }
        } catch (e) { /* 降级：保留默认 :root light 令牌 */ }
      })();
    </script>
    <title>AI Search · 设置</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
